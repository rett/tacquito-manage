! --- TACACS+ Server & AAA ---
! Encrypt Type 0 plaintext secrets in running-config.
! (Type 7 is trivially reversible; for Type 6 AES encryption of the
!  TACACS+ key, run 'key config-key password-encrypt <master>' first,
!  then re-enter the key with 'key 6 <encrypted-string>'.)
service password-encryption
!
aaa new-model
!
! Optional: pin TACACS+ client to a known source interface so prefix-based
! ACLs on the tacquito side have a stable source IP. Uncomment and replace
! the interface token with your management interface (e.g. Loopback0).
! ip tacacs source-interface Loopback0
!
tacacs server TACACS
  address ipv4 10.0.0.42
  key prod-secret-0123456789abcdef
  single-connection
  timeout 5
!
aaa group server tacacs+ TACACS-GROUP
  server name TACACS
!
aaa authentication login default group TACACS-GROUP local
aaa authorization exec default group TACACS-GROUP local if-authenticated
aaa accounting exec default start-stop group TACACS-GROUP
aaa accounting commands 1 default start-stop group TACACS-GROUP
aaa accounting commands 7 default start-stop group TACACS-GROUP
aaa accounting commands 15 default start-stop group TACACS-GROUP
!
! Per-command authorization (managed by 'tacctl group commands').
aaa authorization commands 1 default group TACACS-GROUP local
aaa authorization commands 7 default group TACACS-GROUP local
aaa authorization commands 15 default group TACACS-GROUP local
!
! --- operator — Privilege Level 7 Commands ---
privilege exec level 7 show running-config
privilege exec level 7 show startup-config
privilege exec level 7 show tech-support
privilege exec level 7 show archive
privilege exec level 7 show access-list
privilege exec level 7 show ip route
!
! VTY-ACL not emitted — mgmt-acl list is empty.
! Populate it on the tacquito server with
!   tacctl config mgmt-acl add <cidr>
! then re-run 'tacctl config cisco' to get the access-list block.
!
line con 0
  login authentication default
  exec-timeout 60 0
!
line vty 0 15
  login authentication default
  transport input ssh
! access-class VTY-ACL in   ! uncomment after populating mgmt-acl
  exec-timeout 60 0

--------------------------------------------
Group → Privilege Level Mapping:
  readonly: priv-lvl 1
  operator: priv-lvl 7
  superuser: priv-lvl 15

Notes:
  - The 'local' fallback ensures access if TACACS+ is unreachable
  - Ensure a local admin account exists as a backup
  - Uncomment 'ip tacacs source-interface ...' to pin the TACACS+ client source
  - VTY-ACL permits are managed with 'tacctl config mgmt-acl add <cidr>'
  - For Type 6 (AES) key encryption, run on the device first:
      conf t ; key config-key password-encrypt <master-key>
      password encryption aes
    then re-enter the tacacs key. (Type 7 is trivially reversible.)
  - Manage 'privilege exec level' mappings with 'tacctl group privilege add ...'
    (defaults move only the verified priv-15 commands DOWN; nothing is moved UP)
  - Using template: /home/rett/tacctl/config/templates/cisco.template

